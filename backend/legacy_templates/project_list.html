<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Proyectos</title>
    <link rel="stylesheet" href="/static/css/odoo_login.css">
    <style>
      .page-header{background:linear-gradient(135deg,#111827,#172554);color:#eef2ff;padding:28px 32px;border-radius:28px;display:flex;align-items:center;justify-content:space-between;gap:16px;box-shadow:0 24px 60px rgba(15,23,42,0.32);border:1px solid rgba(148,163,184,0.14)}
      .page-title{font-size:2rem;font-weight:800;letter-spacing:-.03em;margin:0}
      .page-breadcrumb{font-size:13px;color:rgba(226,232,240,0.75);margin-top:6px}
      .page-actions{display:flex;align-items:center;flex-wrap:wrap;gap:12px}
      .action-pill{background:rgba(255,255,255,0.05);border:1px solid rgba(148,163,184,0.16);border-radius:999px;padding:10px 16px;color:#cbd5e1;font-size:14px;text-decoration:none;transition:all .18s ease}
      .action-pill:hover{background:rgba(56,189,248,0.12);color:#f8fafc}
      .action-pill.active{background:rgba(56,189,248,0.18);border-color:rgba(56,189,248,0.32);color:#fff}
      .search-box{display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid rgba(148,163,184,0.18);border-radius:16px;padding:10px 14px;color:#cbd5e1}
      .search-box input{border:none;outline:none;width:180px;font-size:14px;background:transparent;color:#eef2ff}
      .btn-create{background:linear-gradient(135deg,#38bdf8,#7c3aed);color:#fff;padding:12px 18px;border-radius:999px;text-decoration:none;font-weight:700;border:none;box-shadow:0 16px 30px rgba(56,189,248,0.18)}
      .btn-create:hover{transform:translateY(-1px)}
      .projects-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px;padding:22px}
      .proj-card{background:rgba(15,23,42,0.96);border:1px solid rgba(148,163,184,0.16);padding:24px;border-radius:24px;box-shadow:0 24px 60px rgba(15,23,42,0.22);transition:transform .2s ease,box-shadow .2s ease;overflow:hidden}
      .proj-card:hover{transform:translateY(-4px);box-shadow:0 30px 70px rgba(15,23,42,0.32)}
      .proj-header{font-weight:700;color:#f8fafc;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
      .proj-label{display:flex;align-items:center;gap:10px;font-size:1rem;color:#e2e8f0}
      .proj-label span{display:inline-flex;width:26px;height:26px;align-items:center;justify-content:center;border-radius:10px;background:rgba(56,189,248,0.12);color:#38bdf8;font-size:14px}
      .proj-meta{color:#94a3b8;font-size:14px;line-height:1.8;margin-bottom:18px}
      .proj-booster{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:18px}
      .proj-stat{display:flex;align-items:center;gap:12px;padding:16px;border-radius:18px;background:rgba(255,255,255,0.04);border:1px solid rgba(148,163,184,0.12);font-size:13px;color:#e2e8f0}
      .proj-stat span.icon{display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;border-radius:12px;background:rgba(56,189,248,0.16);color:#38bdf8;font-size:12px}
      .proj-stat strong{color:#fff}
      .projects-grid a{color:inherit;text-decoration:none}
      .project-header-actions{display:flex;gap:8px;align-items:center}
      .project-tag{font-size:12px;padding:6px 12px;border-radius:999px;background:rgba(56,189,248,0.12);color:#38bdf8}
    </style>
  </head>
  <body>
    <div class="page-header">
      <div>
        <div style="display:flex;align-items:center;gap:12px;">
          <div class="page-title">Proyecto</div>
          <a href="{{ url_for('create_project') }}" class="btn-create">Nuevo proyecto</a>
        </div>
        <div class="page-breadcrumb">Proyectos</div>
      </div>
      <div class="page-actions">
        <a class="action-pill" href="/dashboard">Dashboard</a>
        <a class="action-pill{% if filter_by == 'all' %} active{% endif %}" href="/app/project?filter=all">Proyectos</a>
        <a class="action-pill{% if filter_by == 'assigned' %} active{% endif %}" href="/app/project?filter=assigned">Asignados</a>
        <a class="action-pill{% if filter_by == 'hitos' %} active{% endif %}" href="/app/project?filter=hitos">Hitos</a>
        <a class="action-pill{% if filter_by == 'sprint' %} active{% endif %}" href="/app/project?filter=sprint">Sprint</a>
        <div class="search-box">
          <span style="margin-right:8px;">🔍</span>
          <input type="search" placeholder="Buscar..." />
        </div>
      </div>
    </div>
    <div class="projects-grid">
      {% for p in projects %}
      <a href="/project/{{ p.id }}" class="proj-card">
        <div class="proj-header">
          <div class="proj-label"><span>★</span>{{ p.name }}</div>
          <div class="project-header-actions"><span class="project-tag">Proyecto</span></div>
        </div>
        <div class="proj-meta"><span>▹</span> Tipo de negocio: Nacional<br/><span>▹</span> Línea de producto: ERP_Odoo</div>
        <div class="proj-booster">
          <div class="proj-stat"><span class="icon">🗂</span><strong>{{ p.tasks }}</strong> Tasks</div>
          <div class="proj-stat"><span class="icon">🎫</span><strong>{{ p.tickets }}</strong> Tickets</div>
        </div>
      </a>
      {% endfor %}
    </div>
  </body>
</html>
