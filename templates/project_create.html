{% extends "app_page.html" %}
{% block content %}
<section class="card card-panel">
  <div class="card-header">
    <h2>Crear nuevo proyecto</h2>
    <p>Define el nombre y los usuarios asignados para comenzar a gestionar el proyecto.</p>
  </div>
  <form class="form-grid" method="post" action="{{ url_for('create_project') }}">
    <label class="field-group">
      <span>Nombre del proyecto</span>
      <input name="name" type="text" placeholder="Ej. Migración ERP" required>
    </label>
    <label class="field-group">
      <span>Usuarios asignados</span>
      <input name="assigned_emails" type="text" placeholder="user1@example.com,user2@example.com">
      <small>Separe los correos con comas.</small>
    </label>
    <div class="form-footer">
      <button class="btn btn-primary" type="submit">Crear proyecto</button>
      <a class="btn btn-link" href="{{ url_for('open_app', name='project') }}">Volver a proyectos</a>
    </div>
  </form>
</section>
{% endblock %}
