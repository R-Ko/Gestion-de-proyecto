<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar sesión · Odoo style</title>
    <link rel="stylesheet" href="/static/css/odoo_login.css">
  </head>
  <body>
    <div class="login-page">
      <div class="login-box">
        <div class="logo-wrap">
          <img src="/static/img/logo.svg" alt="Your logo">
        </div>
        <form method="post" action="/login" class="login-form">
          <label>Correo electrónico</label>
          <input name="login" type="text" placeholder="Correo electrónico" autofocus>

          <label>Contraseña</label>
          <input name="password" type="password" placeholder="Contraseña">

          <button class="btn-login" type="submit">Iniciar sesión</button>
        </form>

        <div class="links">
          <a href="/reset">Restablecer contraseña</a>
        </div>
      </div>
    </div>
  </body>
</html>
