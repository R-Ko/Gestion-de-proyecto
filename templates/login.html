<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Login AI · Future Flow</title>
  <!-- Google Fonts: Inter & Poppins (Modern Sans) -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (Free Icons for integrations) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Poppins', sans-serif;
      background: #0A0A0F;
      height: 100vh;
      width: 100%;
      overflow: hidden;
    }

    /* SPLIT SCREEN LAYOUT */
    .split-layout {
      display: flex;
      width: 100%;
      height: 100%;
      flex-direction: row;
    }

    /* LEFT PANEL — Branding & Visuals (Dark + purple glow) */
    .left-panel {
      flex: 1;
      background: radial-gradient(circle at 20% 30%, #0b0710, #030105);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3rem;
      overflow: hidden;
      backdrop-filter: blur(0px);
      border-right: 1px solid rgba(128, 90, 213, 0.2);
    }

    /* animated gradient orb (futuristic) */
    .left-panel::before {
      content: "";
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(128, 0, 255, 0.25) 0%, rgba(255, 0, 128, 0) 70%);
      top: -20%;
      left: -20%;
      border-radius: 50%;
      filter: blur(70px);
      z-index: 0;
    }

    .left-panel::after {
      content: "";
      position: absolute;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 80, 200, 0.2) 0%, rgba(100, 0, 255, 0) 70%);
      bottom: -15%;
      right: -15%;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
    }

    .brand-content {
      position: relative;
      z-index: 2;
      max-width: 480px;
      text-align: center;
      margin-bottom: 2rem;
    }

    /* logo con glow effect */
    .logo-glow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(20, 15, 40, 0.6);
      backdrop-filter: blur(8px);
      padding: 0.9rem 2rem;
      border-radius: 80px;
      border: 1px solid rgba(168, 85, 247, 0.5);
      box-shadow: 0 0 25px rgba(168, 85, 247, 0.3);
      margin-bottom: 2rem;
    }

    .logo-icon {
      font-size: 2.4rem;
      color: #c084fc;
      filter: drop-shadow(0 0 8px #a855f7);
    }

    .logo-text {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #E9D5FF, #C084FC);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .headline {
      font-size: 2.6rem;
      font-weight: 700;
      line-height: 1.2;
      margin: 1.5rem 0 1rem;
      background: linear-gradient(to right, #f0f0ff, #d9b4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subheadline {
      font-size: 1rem;
      color: #b9b3d4;
      margin-bottom: 2.8rem;
      font-weight: 400;
    }

    /* floating integrations icons (surrounding) */
    .integration-icons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2rem;
      margin-top: 2.5rem;
      position: relative;
    }

    .int-icon {
      background: rgba(30, 25, 55, 0.7);
      backdrop-filter: blur(8px);
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 28px;
      font-size: 1.8rem;
      color: #cdb4ff;
      border: 1px solid rgba(168, 85, 247, 0.4);
      transition: all 0.25s ease;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .int-icon:hover {
      transform: translateY(-6px);
      border-color: #c084fc;
      color: white;
      background: rgba(128, 70, 200, 0.6);
      box-shadow: 0 0 16px rgba(168,85,247,0.6);
    }

    /* floating animation */
    .int-icon {
      animation: floatSoft 4s infinite ease-in-out;
    }
    .int-icon:nth-child(2) { animation-delay: 0.6s; }
    .int-icon:nth-child(3) { animation-delay: 1.2s; }
    .int-icon:nth-child(4) { animation-delay: 0.3s; }
    .int-icon:nth-child(5) { animation-delay: 0.9s; }

    @keyframes floatSoft {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
      100% { transform: translateY(0px); }
    }

    /* RIGHT PANEL — Glassmorphism Login Form */
    .right-panel {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0c0c12;
      backdrop-filter: blur(2px);
      position: relative;
    }

    .form-container {
      width: 100%;
      max-width: 440px;
      padding: 2rem 2rem;
      margin: 1.5rem;
      background: rgba(18, 18, 28, 0.75);
      backdrop-filter: blur(12px);
      border-radius: 2rem;
      border: 1px solid rgba(128, 90, 213, 0.3);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.4), 0 0 0 0.5px rgba(168, 85, 247, 0.2);
      transition: all 0.3s;
    }

    .welcome-title {
      font-size: 2.2rem;
      font-weight: 600;
      background: linear-gradient(120deg, #FFFFFF, #ddbbff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.3px;
    }

    .signup-prompt {
      color: #a7a3c2;
      font-size: 0.95rem;
      margin-bottom: 2rem;
      border-left: 2px solid #a855f7;
      padding-left: 10px;
    }

    .signup-prompt a {
      color: #d9b4ff;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }

    .signup-prompt a:hover {
      color: #f0d6ff;
      text-shadow: 0 0 4px #b77eff;
    }

    /* Glass input fields */
    .input-group-custom {
      margin-bottom: 1.6rem;
    }

    .input-label {
      display: block;
      margin-bottom: 0.6rem;
      font-weight: 500;
      color: #cfc9f0;
      font-size: 0.9rem;
      letter-spacing: 0.3px;
    }

    .glass-input {
      width: 100%;
      background: rgba(25, 22, 40, 0.8);
      border: 1px solid rgba(156, 110, 240, 0.4);
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: #f0ecff;
      transition: all 0.25s ease;
      outline: none;
    }

    .glass-input:focus {
      border-color: #c084fc;
      background: rgba(30, 26, 55, 0.9);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3);
    }

    .glass-input::placeholder {
      color: #6b6292;
      font-weight: 400;
    }

    /* password eye wrapper */
    .password-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .password-wrapper .glass-input {
      padding-right: 3rem;
    }
    .toggle-eye {
      position: absolute;
      right: 1rem;
      background: transparent;
      border: none;
      color: #a690d4;
      cursor: pointer;
      font-size: 1.2rem;
      transition: color 0.2s;
      z-index: 2;
    }
    .toggle-eye:hover {
      color: #e2c6ff;
    }

    /* row with remember & forgot */
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 1.4rem 0 1.8rem;
      font-size: 0.9rem;
    }

    .checkbox-custom {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #bcb3e2;
      cursor: pointer;
    }
    .checkbox-custom input {
      accent-color: #a855f7;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .forgot-link {
      color: #c7b0ff;
      text-decoration: none;
      font-weight: 500;
      transition: 0.2s;
    }
    .forgot-link:hover {
      color: #e8d5ff;
      text-decoration: underline;
    }

    /* primary button with purple-pink gradient + glow */
    .login-btn {
      width: 100%;
      background: linear-gradient(105deg, #b63aff, #a540f0, #dd6eff);
      border: none;
      padding: 0.9rem;
      border-radius: 1.4rem;
      font-weight: 700;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      color: white;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 18px rgba(139, 69, 211, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(105deg, #c44eff, #b345f0, #ed7bff);
      box-shadow: 0 12px 28px rgba(156, 70, 250, 0.6);
    }

    .login-btn:active {
      transform: translateY(1px);
    }

    /* optional additional divider */
    .demo-note {
      text-align: center;
      margin-top: 1.8rem;
      font-size: 0.75rem;
      color: #5e5480;
    }

    /* responsive: if screen width < 900px, column layout */
    @media (max-width: 900px) {
      .split-layout {
        flex-direction: column;
        overflow-y: auto;
      }
      .left-panel {
        min-height: 340px;
        border-right: none;
        border-bottom: 1px solid rgba(128, 90, 213, 0.3);
        padding: 2rem 1rem;
      }
      .right-panel {
        padding: 2rem 1rem;
        align-items: center;
      }
      .headline {
        font-size: 2rem;
      }
      .brand-content {
        max-width: 100%;
      }
      body {
        overflow: auto;
      }
    }
  </style>
</head>
<body>
<div class="split-layout">
  <!-- LEFT PANEL: Futuristic AI branding, icons and glow -->
  <div class="left-panel">
    <div class="brand-content">
      <div class="logo-glow">
        <i class="fas fa-brain logo-icon"></i>
        <span class="logo-text">FutureFlow</span>
      </div>
      <h1 class="headline">Gestor de Proyectos</h1>
      <p class="subheadline">“Organiza, ejecuta y entrega sin complicaciones.”</p>
      
      <!-- Floating integrations icons: Google, Slack, Zoom, etc -->
      <div class="integration-icons">
        <div class="int-icon"><i class="fab fa-google"></i></div>
        <div class="int-icon"><i class="fab fa-slack"></i></div>
        <div class="int-icon"><i class="fab fa-zoom"></i></div>
        <div class="int-icon"><i class="fab fa-figma"></i></div>
        <div class="int-icon"><i class="fas fa-robot"></i></div>
      </div>
      <div class="integration-icons" style="margin-top: 0.8rem; gap: 1.8rem;">
        <div class="int-icon"><i class="fab fa-github"></i></div>
        <div class="int-icon"><i class="fab fa-microsoft"></i></div>
        <div class="int-icon"><i class="fas fa-database"></i></div>
      </div>
    </div>
  </div>

  <!-- RIGHT PANEL: Glassmorphism centered login form -->
  <div class="right-panel">
    <div class="form-container">
      <div class="welcome-title">Bienvenido!</div>
      <form method="post" action="/login" id="loginForm">
        <!-- Email field -->
        <div class="input-group-custom">
          <label class="input-label"><i class="fas fa-envelope" style="margin-right: 6px; font-size: 0.8rem;"></i> Correo electrónico</label>
          <input type="email" class="glass-input" id="email" name="email" placeholder="hello@futureflow.ai" required autofocus>
        </div>

        <!-- Password with eye toggle -->
        <div class="input-group-custom">
          <label class="input-label"><i class="fas fa-lock" style="margin-right: 6px;"></i> Contraseña</label>
          <div class="password-wrapper">
            <input type="password" class="glass-input" id="password" name="password" placeholder="••••••••" required>
            <button type="button" class="toggle-eye" id="togglePwBtn" aria-label="Show password">
              <i class="far fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <!-- Options row -->
        <div class="form-options">
          <label class="checkbox-custom">
            <input type="checkbox" id="rememberCheckbox"> Recordarme
          </label>
          <a href="/reset" class="forgot-link" id="forgotPwLink">Olvidaste tu contraseña?</a>
        </div>

        <!-- Gradient button with icon -->
        <button type="submit" class="login-btn">
          <i class="fas fa-arrow-right-to-bracket"></i> Sign in
        </button>
        <div class="demo-note">
          <i class="fas fa-shield-alt"></i> Secured with end-to-end encryption
        </div>
      </form>
    </div>
  </div>
</div>

  // Forgot password link now navigates to the real reset page

  if (signupLink) {
    signupLink.addEventListener('click', function(e) {
      e.preventDefault();
      showFancyAlert('🚀 Create your account — start 14-day free trial (demo interaction)', 'info');
    });

  // Simple toast-like non-intrusive alert that matches aesthetic
  function showFancyAlert(message, type) {
    // remove existing toast if present
    const existingToast = document.querySelector('.custom-toast-notify');
    if(existingToast) existingToast.remove();
    
    const toastDiv = document.createElement('div');
    toastDiv.className = 'custom-toast-notify';
    let bgGradient = 'linear-gradient(135deg, #28224b, #1a1733)';
    let iconHtml = '✨';
    if(type === 'success') {
      bgGradient = 'linear-gradient(135deg, #2f2552, #1e193f)';
      iconHtml = '✔️';
    }
    toastDiv.style.cssText = `
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: ${bgGradient};
      backdrop-filter: blur(16px);
      border: 1px solid rgba(168, 85, 247, 0.5);
      border-radius: 60px;
      padding: 12px 28px;
      color: #efeaff;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      z-index: 9999;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      gap: 10px;
      letter-spacing: 0.2px;
      pointer-events: none;
      animation: fadeSlideUp 0.25s ease-out forwards;
    `;
    toastDiv.innerHTML = `<span>${iconHtml}</span> ${message}`;
    document.body.appendChild(toastDiv);
    setTimeout(() => {
      if(toastDiv) toastDiv.style.opacity = '0';
      setTimeout(() => { if(toastDiv) toastDiv.remove(); }, 300);
    }, 2800);
  }
  
  // add keyframe if not present
  if (!document.querySelector('#dynamicToastStyle')) {
    const styleSheet = document.createElement("style");
    styleSheet.id = 'dynamicToastStyle';
    styleSheet.innerText = `
      @keyframes fadeSlideUp {
        0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
        100% { opacity: 1; transform: translateX(-50%) translateY(0px); }
      }
    `;
    document.head.appendChild(styleSheet);
  }

  // Optional: small additional background glowing on left panel

</html>
