<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apps · Odoo style</title>
    <link rel="stylesheet" href="/static/css/odoo_login.css">
    <style>
      :root{--surface:#0d1230;--surface-strong:#10184d;--accent:#7c3aed;--accent-alt:#38bdf8;--text:#edf2ff;--text-muted:#cbd5e1}
      body{background:transparent}
      .topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;background:linear-gradient(135deg,#0f172a,#312e81);border-bottom:1px solid rgba(148,163,184,0.16);color:#fff}
      .topbar .brand{font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:.95rem}
      .topbar .user{font-size:.95rem;opacity:.88}
      .apps-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:26px;padding:60px;max-width:1080px;margin:0 auto}
      .app-tile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:24px;background:rgba(15,23,42,0.9);border:1px solid rgba(148,163,184,0.14);border-radius:24px;box-shadow:0 20px 45px rgba(0,0,0,0.26);transition:transform .2s ease,background .2s ease;color:#fff}
      .app-tile:hover{transform:translateY(-4px);background:rgba(56,189,248,0.08)}
      .app-icon{width:64px;height:64px;border-radius:18px;background:linear-gradient(135deg,#7c3aed,#38bdf8);display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;box-shadow:0 18px 35px rgba(56,189,248,0.18)}
      .app-label{font-size:.95rem;font-weight:700;text-align:center;color:#eef2ff}
    </style>
  </head>
  <body>
    <div class="topbar">
      <div>
        <div class="brand">Mi Odoo (demo)</div>
        <div class="user">{{ user }}</div>
      </div>
    </div>
    <div class="apps-grid">
      {% for label, key in modules %}
      <a class="app-tile" href="/app/{{ key }}">
        <div class="app-icon">{{ label[0] }}</div>
        <div class="app-label">{{ label }}</div>
      </a>
      {% endfor %}
    </div>
  </body>
</html>
