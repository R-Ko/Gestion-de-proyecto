<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apps · FutureFlow</title>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', sans-serif;
        background: #0f0d1d;
        color: #f5f3ff;
        min-height: 100vh;
      }
      .page {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }
      .topbar {
        width: 100%;
        max-width: 980px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .brand {
        font-size: 1.5rem;
        font-weight: 700;
        color: #c084fc;
      }
      .user {
        color: #d8d1ff;
      }
      .apps-grid {
        width: 100%;
        max-width: 980px;
        display: grid;
        gap: 1.25rem;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }
      .app-tile {
        display: block;
        padding: 1.6rem;
        border-radius: 24px;
        border: 1px solid rgba(192, 132, 252, 0.2);
        background: rgba(23, 18, 42, 0.9);
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .app-tile:hover {
        transform: translateY(-4px);
        border-color: rgba(192, 132, 252, 0.45);
        box-shadow: 0 18px 45px rgba(93, 45, 154, 0.16);
      }
      .app-icon {
        font-size: 2rem;
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: linear-gradient(135deg, #8b5cf6, #d946ef);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: white;
        margin-bottom: 1rem;
      }
      .app-label {
        font-size: 1rem;
        font-weight: 700;
      }
      .subtitle {
        max-width: 980px;
        color: #b9a8ff;
        margin-bottom: 1.75rem;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="topbar">
        <div>
          <div class="brand">FutureFlow Apps</div>
          <div class="subtitle">Selecciona un módulo para continuar con la administración del proyecto.</div>
        </div>
        <div class="user">Usuario: {{ user or 'Invitado' }}</div>
      </div>
      <div class="apps-grid">
        {% for label, key in modules %}
          <a class="app-tile" href="/app/{{ key }}">
            <div class="app-icon">{{ label[0] }}</div>
            <div class="app-label">{{ label }}</div>
          </a>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
