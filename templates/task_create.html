{% extends "app_page.html" %}
{% block content %}
<section class="card card-panel">
  <div class="card-header">
    <h2>Crear tarea en {{ project.name }}</h2>
    <p>Agrega una tarea dentro del proyecto y elige su estado inicial.</p>
  </div>
  <form class="form-grid" method="post" action="{{ url_for('create_task', project_id=project.id) }}">
    <label class="field-group">
      <span>Título</span>
      <input name="title" type="text" placeholder="Nombre de la tarea" required>
    </label>
    <label class="field-group">
      <span>Asignado a</span>
      <select name="assigned_email">
        <option value="">Sin asignar</option>
        {% for user in project_users %}
        <option value="{{ user }}">{{ user }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field-group">
      <span>Estado</span>
      <select name="stage">
        {% for value,label in stage_options %}
        <option value="{{ value }}">{{ label }}</option>
        {% endfor %}
      </select>
    </label>
    <label class="field-group">
      <span>Categoría</span>
      <input name="category" type="text" placeholder="Codificación, Análisis, etc.">
    </label>
    <label class="field-group">
      <span>Fecha límite</span>
      <input name="deadline" type="date">
    </label>
    <label class="field-group">
      <span>Hito</span>
      <input name="milestone" type="text" placeholder="Hito del proyecto">
    </label>
    <label class="field-group">
      <span>Sprint</span>
      <input name="sprint" type="text" placeholder="Sprint X">
    </label>
    <label class="field-group">
      <span>Descripción</span>
      <textarea name="description" placeholder="Detalles de la tarea"></textarea>
    </label>
    <label class="field-group">
      <span>ID de tarea</span>
      <input name="ticket_number" type="text" placeholder="Opcional, ej. 17045">
    </label>
    <div class="form-footer">
      <button class="btn btn-primary" type="submit">Crear tarea</button>
      <a class="btn btn-link" href="{{ url_for('project_detail', project_id=project.id) }}">Volver al proyecto</a>
    </div>
  </form>
</section>
{% endblock %}
