{% extends "app_page.html" %}
{% block content %}
<h1>Editar proyectos permitidos para {{ user.email }}</h1>
<form method="post">
  <div>
    {% for p in projects %}
      <label>
        <input type="checkbox" name="projects" value="{{ p.id }}" {% if p.id in allowed %}checked{% endif %}>
        {{ p.name }}
      </label><br>
    {% endfor %}
  </div>
  <button type="submit">Guardar</button>
</form>
<p><a href="{{ url_for('open_app', name='users') }}">Volver a usuarios</a></p>
{% endblock %}
